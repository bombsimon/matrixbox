<div class="card">
  <div class="section-title">Last.fm Username</div>
  <input type="text" id="username" placeholder="your username" />
</div>

<div class="card">
  <div class="section-title">Last.fm API Key</div>
  <input
    type="password"
    id="api_key"
    placeholder="your api key"
    autocomplete="off"
    style="
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 10px 12px;
      color: var(--text);
      font-size: 0.93rem;
      outline: none;
      -webkit-appearance: none;
    "
  />
  <a
    href="https://www.last.fm/api/account/create"
    target="_blank"
    style="
      display: inline-block;
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--accent);
    "
    >Generate a key here</a
  >
</div>

<div class="card">
  <div class="section-title">Artist Color</div>
  <div class="swatch-row">
    <input
      type="color"
      id="artist_color"
      value="#ffffff"
      class="color-swatch"
      style="
        padding: 0;
        border: 2px solid rgba(255, 255, 255, 0.3);
        cursor: pointer;
      "
      onchange="p('artist_color=' + this.value.substring(1))"
    />
  </div>
</div>

<div class="card">
  <div class="section-title">Song Color</div>
  <div class="swatch-row">
    <input
      type="color"
      id="song_color"
      value="#4488ff"
      class="color-swatch"
      style="
        padding: 0;
        border: 2px solid rgba(255, 255, 255, 0.3);
        cursor: pointer;
      "
      onchange="p('song_color=' + this.value.substring(1))"
    />
  </div>
</div>

<div class="card">
  <div class="section-title">Dash Color</div>
  <div class="swatch-row">
    <input
      type="color"
      id="dash_color"
      value="#ffffff"
      class="color-swatch"
      style="
        padding: 0;
        border: 2px solid rgba(255, 255, 255, 0.3);
        cursor: pointer;
      "
      onchange="p('dash_color=' + this.value.substring(1))"
    />
  </div>
</div>

<div class="card">
  <div class="section-title">Shadow Color</div>
  <div class="swatch-row">
    <input
      type="color"
      id="shadow_color"
      value="#000000"
      class="color-swatch"
      style="
        padding: 0;
        border: 2px solid rgba(255, 255, 255, 0.3);
        cursor: pointer;
      "
      onchange="p('shadow_color=' + this.value.substring(1))"
    />
  </div>
</div>

<div class="card">
  <div class="section-title">Layout</div>
  <div class="seg" id="layout-seg">
    <button id="lay_single" onclick="pl('single')">Artist - Track</button>
    <button id="lay_double" onclick="pl('double')">Two lines</button>
  </div>
</div>

<div class="card">
  <div class="section-title">Alignment</div>
  <div class="seg" id="align-seg">
    <button id="al_left" onclick="pa('left')">Left</button>
    <button id="al_center" onclick="pa('center')">Center</button>
  </div>
</div>

<div class="card">
  <div class="section-title">Auto-exit when idle</div>
  <select
    id="idle_timeout"
    style="
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 10px 12px;
      color: var(--text);
      font-size: 0.93rem;
      outline: none;
      -webkit-appearance: none;
    "
    onchange="p('idle_timeout=' + this.value)"
  >
    <option value="5">After 5 min</option>
    <option value="10">After 10 min</option>
    <option value="30">After 30 min</option>
    <option value="60">After 1 hour</option>
    <option value="120">After 2 hours</option>
    <option value="0">Never</option>
  </select>
</div>

<div class="card">
  <button
    class="btn"
    id="savebtn"
    onclick="save(this)"
    style="background: #285; width: 100%"
  >
    &#128190; Save Settings
  </button>
</div>

<script>
  function p(q) {
    fetch("/?" + q, { method: "POST" });
  }
  function save(b) {
    var q =
      "username=" +
      encodeURIComponent(document.getElementById("username").value) +
      "&api_key=" +
      encodeURIComponent(document.getElementById("api_key").value) +
      "&artist_color=" +
      document.getElementById("artist_color").value.substring(1) +
      "&song_color=" +
      document.getElementById("song_color").value.substring(1) +
      "&dash_color=" +
      document.getElementById("dash_color").value.substring(1) +
      "&shadow_color=" +
      document.getElementById("shadow_color").value.substring(1) +
      "&layout=" +
      document.querySelector("#layout-seg button.on").id.replace("lay_", "") +
      "&align=" +
      document.querySelector("#align-seg button.on").id.replace("al_", "") +
      "&idle_timeout=" +
      document.getElementById("idle_timeout").value +
      "&save=1";
    fetch("/?" + q, { method: "POST" }).then(function () {
      b.textContent = "✓ Saved";
    });
  }
  function pl(m) {
    p("layout=" + m);
    document.querySelectorAll("#layout-seg button").forEach(function (b) {
      b.classList.toggle("on", b.id === "lay_" + m);
    });
  }
  function pa(a) {
    p("align=" + a);
    document.querySelectorAll("#align-seg button").forEach(function (b) {
      b.classList.toggle("on", b.id === "al_" + a);
    });
  }
  fetch("/settings")
    .then(function (r) {
      return r.json();
    })
    .then(function (s) {
      document.getElementById("username").value = s.username || "";
      document.getElementById("api_key").value = s.api_key || "";
      document.getElementById("artist_color").value =
        s.artist_color || "#ffffff";
      document.getElementById("song_color").value = s.song_color || "#4488ff";
      document.getElementById("dash_color").value = s.dash_color || "#ffffff";
      document.getElementById("shadow_color").value =
        s.shadow_color || "#000000";
      document
        .getElementById("lay_" + (s.layout || "single"))
        .classList.add("on");
      document
        .getElementById("al_" + (s.align || "center"))
        .classList.add("on");
      document.getElementById("idle_timeout").value =
        s.idle_timeout === undefined ? "10" : String(s.idle_timeout);
    });
</script>
